<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracket City</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #f0f0f0; font-family: 'Courier New', Courier, monospace; min-height: 100vh; }
.outer { max-width: 700px; margin: 0 auto; padding: 2rem 1rem 1.5rem; }
.header { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.3rem; }
.title { font-size: 2rem; font-weight: 900; font-family: Georgia, serif; letter-spacing: 1px; color: #111; }
.date-row { text-align: center; font-size: 0.85rem; font-weight: 700; letter-spacing: 2px; font-family: Georgia, serif; color: #222; margin-bottom: 1.5rem; text-transform: uppercase; }
.para-card { background: #e8e8e8; border-radius: 14px; padding: 1.4rem 1.5rem; font-size: 1.05rem; line-height: 2.4; color: #111; margin-bottom: 1rem; word-break: break-word; }
.clue-available { background: #6c6fc7; color: #fff; font-weight: 700; cursor: pointer; border-radius: 3px; padding: 1px 3px; }
.clue-available:hover { background: #5558b0; }
.clue-solved-recent { background: #a8e6a8; color: #111; border-radius: 3px; padding: 1px 3px; }
.input-row { display: flex; border-radius: 10px; overflow: hidden; background: #fff; border: 1.5px solid #ccc; }
.ans-input { flex: 1; padding: 0.8rem 1rem; font-size: 1rem; font-family: 'Courier New', Courier, monospace; border: none; background: transparent; color: #555; outline: none; }
.ans-input::placeholder { color: #bbb; }
.enter-btn { background: #6c6fc7; color: #fff; border: none; padding: 0 1.3rem; font-size: 1rem; font-family: 'Courier New', Courier, monospace; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
.enter-btn:hover { background: #5558b0; }
.shake { animation: sh 0.35s; }
@keyframes sh { 0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)} }
.final-reveal { display: none; background: #fff; border-radius: 12px; padding: 1.8rem 1.5rem; text-align: center; font-family: Georgia, serif; }
.final-reveal.show { display: block; }
